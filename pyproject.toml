# pyproject.toml — Single source of truth for tooling configuration.

[tool.black]
line-length = 100
target-version = ["py310"]
extend-exclude = '''
/(
    venv
  | \.venv
  | logs
  | simulation
  | raw_data
  | data
  | models
)/
'''

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["venv", ".venv", "logs", "simulation", "raw_data", "data", "models"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
pythonpath = ["."]
